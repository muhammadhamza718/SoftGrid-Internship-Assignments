<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search real-time weather conditions for any city worldwide. View temperature, humidity, wind speed, and more.">
  <title>SkyCast — Live Weather Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Ambient background orbs -->
  <div class="bg-orb bg-orb--1" aria-hidden="true"></div>
  <div class="bg-orb bg-orb--2" aria-hidden="true"></div>

  <header class="header">
    <h1 class="header__title">SkyCast</h1>
    <p class="header__tagline">Real-time weather, beautifully.</p>
  </header>

  <main class="main">

    <!-- Search Section -->
    <section id="search" class="search-section">
      <form id="search-form" class="search-form glass-card" autocomplete="off">
        <input
          id="city-input"
          class="search-form__input"
          type="text"
          placeholder="Search any city…"
          aria-label="Enter a city name to search weather"
          required
        >
        <button
          type="submit"
          id="search-btn"
          class="search-form__btn"
          aria-label="Search weather"
        >
          <svg class="search-form__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </form>
    </section>

    <!-- Weather Result Section -->
    <section id="weather-result" class="result-section">

      <!-- Loading State -->
      <div id="loading" class="loading hidden" aria-live="polite">
        <div class="loading__spinner"></div>
        <p class="loading__text">Fetching weather…</p>
      </div>

      <!-- Error State -->
      <div id="error-container" class="error-container glass-card glass-card--error hidden" aria-live="assertive">
        <span class="error-container__icon" aria-hidden="true">🌧️</span>
        <p id="error-message" class="error-container__message"></p>
      </div>

      <!-- Weather Card -->
      <div id="weather-card" class="weather-card glass-card hidden">
        <div class="weather-card__header">
          <div class="weather-card__location">
            <h2 id="city-name" class="weather-card__city"></h2>
            <span id="country" class="weather-card__country"></span>
          </div>
          <div id="weather-icon-container" class="weather-card__icon-container"></div>
        </div>

        <div class="weather-card__body">
          <p id="temperature" class="weather-card__temp"></p>
          <p id="description" class="weather-card__desc"></p>
        </div>

        <div class="weather-card__details">
          <div class="weather-card__detail">
            <svg class="weather-card__detail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
            <div class="weather-card__detail-info">
              <span class="weather-card__detail-value" id="humidity"></span>
              <span class="weather-card__detail-label">Humidity</span>
            </div>
          </div>
          <div class="weather-card__detail">
            <svg class="weather-card__detail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
            <div class="weather-card__detail-info">
              <span class="weather-card__detail-value" id="wind-speed"></span>
              <span class="weather-card__detail-label">Wind</span>
            </div>
          </div>
        </div>
      </div>

    </section>
  </main>

  <footer class="footer">
    <p class="footer__text">Powered by OpenWeatherMap</p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
